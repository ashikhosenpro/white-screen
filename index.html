<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="favicon.png">

    <title>Pro Studio Light & Color Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; background: #000; user-select: none; }

        /* Main Screen */
        #color-screen {
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            transition: background 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Main Control Bar */
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(25, 25, 25, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 12px 20px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            z-index: 1000;
            transition: opacity 0.4s ease, transform 0.3s ease;
            border: 1px solid rgba(255,255,255,0.08);
            max-width: 95%;
            flex-wrap: wrap;
            justify-content: center;
        }
        #controls.hidden { opacity: 0; transform: translateX(-50%) translateY(20px); pointer-events: none; }

        /* Tooltips */
        .icon-wrapper { position: relative; display: inline-block; }
        .icon-btn {
            width: 36px; height: 36px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15); cursor: pointer;
            transition: all 0.2s ease; outline: none;
        }
        .icon-btn:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.8); box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .icon-btn:active { transform: scale(0.9); }
        
        .tooltip {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); color: #fff; padding: 5px 10px;
            border-radius: 5px; font-size: 11px; white-space: nowrap;
            opacity: 0; pointer-events: none; transition: 0.2s;
        }
        .icon-wrapper:hover .tooltip { opacity: 1; }

        /* --- Trigger Button (Lightbulb) --- */
        .trigger-studio {
            width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
            background: #444; color: #fff; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .trigger-studio:hover { background: #666; border-color: #fff; transform: scale(1.1); }

        /* --- Studio Panel (Dropdown with 10 Colors + Custom) --- */
        #studio-panel {
            display: none;
            position: absolute;
            bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(20px);
            padding: 15px; border-radius: 20px;
            flex-direction: column; gap: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 260px;
        }
        #studio-panel.open { display: flex; }
        
        .panel-title {
            color: rgba(255,255,255,0.5); font-size: 10px; text-transform: uppercase;
            letter-spacing: 1px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; margin-bottom: 5px;
        }

        /* Color Grid (3 Columns) */
        .panel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        
        .studio-btn {
            padding: 8px 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.05); color: #fff; font-size: 10px; cursor: pointer;
            text-align: center; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .studio-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }
        .studio-btn .circle { width: 20px; height: 20px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }

        /* --- Custom Color Picker inside Panel --- */
        .panel-custom {
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); padding: 8px; border-radius: 12px; gap: 10px; margin-top: 5px;
        }
        .panel-custom input[type="color"] {
            width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); cursor: pointer; padding: 0; background: #fff;
        }
        .panel-custom button {
            padding: 6px 16px; border-radius: 20px; border: none; background: #fff; color: #000; font-weight: bold; font-size: 12px; cursor: pointer; transition: 0.2s;
        }
        .panel-custom button:hover { background: #ddd; transform: scale(1.05); }

        /* --- Animation (Inside Panel) --- */
        .anim-group { display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 30px; margin-top: 5px; }
        .btn-anim { width: 28px; height: 28px; border-radius: 50%; border: none; background: #ffaa00; color: #000; font-weight: bold; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-anim.active { background: #ff4444; }
        .btn-anim:hover { transform: scale(1.1); }
        .speed-slider { width: 50px; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.3); border-radius: 2px; outline: none; }
        .speed-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #fff; cursor: pointer; }

        @media (max-width: 600px) {
            #controls { padding: 10px 15px; gap: 8px; border-radius: 40px; }
            .icon-btn, .trigger-studio { width: 32px; height: 32px; }
            #studio-panel { min-width: 220px; padding: 12px; }
            .studio-btn { font-size: 9px; padding: 5px 8px; }
            .panel-custom input[type="color"] { width: 28px; height: 28px; }
        }
    </style>
</head>
<body>

    <div id="color-screen"></div>

    <!-- Main Control Bar -->
    <div id="controls">
        
        <!-- Popular Colors (Main Bar) -->
        <div class="icon-wrapper">
            <button class="icon-btn" onclick="setColor('radial-gradient(circle at center, #ffffff 0%, #fcfcfc 100%)')" style="background: radial-gradient(circle at center, #ffffff 40%, #fcfcfc 100%);"></button>
            <span class="tooltip">⚡ Super White</span>
        </div>
        <div class="icon-wrapper">
            <button class="icon-btn" onclick="setColor('#000000')" style="background: #000000; border-color: #555;"></button>
            <span class="tooltip">Black</span>
        </div>
        <div class="icon-wrapper">
            <button class="icon-btn" onclick="setColor('#9b59b6')" style="background: #9b59b6;"></button>
            <span class="tooltip">Purple</span>
        </div>
        <div class="icon-wrapper">
            <button class="icon-btn" onclick="setColor('#2ecc71')" style="background: #2ecc71;"></button>
            <span class="tooltip">Chroma Green</span>
        </div>
        <div class="icon-wrapper">
            <button class="icon-btn" onclick="setColor('#e74c3c')" style="background: #e74c3c;"></button>
            <span class="tooltip">Red</span>
        </div>

        <!-- Studio Light Trigger -->
        <div class="icon-wrapper">
            <button class="trigger-studio" onclick="toggleStudioPanel()">💡</button>
            <span class="tooltip">Studio Lights (10+ Colors)</span>

            <!-- Studio Panel (Dropdown Menu) -->
            <div id="studio-panel">
                <div class="panel-title">Studio & Pro Colors</div>
                
                <div class="panel-grid">
                    <button class="studio-btn" onclick="setColor('#ffffff')"><span class="circle" style="background:#ffffff;"></span>Pure White</button>
                    <button class="studio-btn" onclick="setColor('#000000')"><span class="circle" style="background:#000000;"></span>Black</button>
                    <button class="studio-btn" onclick="setColor('#fef9f0')"><span class="circle" style="background:#fef9f0;"></span>Face Light</button>
                    
                    <button class="studio-btn" onclick="setColor('#e6f2f5')"><span class="circle" style="background:#e6f2f5;"></span>Soft Fill</button>
                    <button class="studio-btn" onclick="setColor('#f4f5f7')"><span class="circle" style="background:#f4f5f7;"></span>Presentation</button>
                    <button class="studio-btn" onclick="setColor('radial-gradient(circle at center, #ffffff 0%, #fce4d6 60%, #f5d0c5 100%)')"><span class="circle" style="background:radial-gradient(circle at center, #ffffff 40%, #fce4d6 100%);"></span>⭐ Ring Light</button>
                    
                    <button class="studio-btn" onclick="setColor('linear-gradient(90deg, #fde8e0 0%, #fcf3f0 50%, #fde8e0 100%)')"><span class="circle" style="background:linear-gradient(90deg, #fde8e0 0%, #fcf3f0 50%, #fde8e0 100%);"></span>Cinematic</button>
                    <button class="studio-btn" onclick="setColor('#2ecc71')"><span class="circle" style="background:#2ecc71;"></span>Chroma Green</button>
                    <button class="studio-btn" onclick="setColor('#e74c3c')"><span class="circle" style="background:#e74c3c;"></span>Red</button>
                    
                    <button class="studio-btn" onclick="setColor('#9b59b6')"><span class="circle" style="background:#9b59b6;"></span>Purple</button>
                    <button class="studio-btn" onclick="setColor('#f8c8dc')"><span class="circle" style="background:#f8c8dc;"></span>Soft Rose</button>
                </div>

                <!-- Custom Color Picker inside the panel -->
                <div class="panel-custom">
                    <input type="color" id="panel-color-picker" value="#3498db">
                    <button onclick="setColor(document.getElementById('panel-color-picker').value)">Apply Custom Color</button>
                </div>

                <!-- Animation Controls -->
                <div class="anim-group">
                    <button id="animBtn" class="btn-anim" onclick="toggleAnimation()">▶</button>
                    <input type="range" id="speedSlider" class="speed-slider" min="1" max="10" value="4">
                    <span style="color: #aaa; font-size: 9px;">Speed</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        const screenEl = document.getElementById('color-screen');
        const controlsEl = document.getElementById('controls');
        const studioPanel = document.getElementById('studio-panel');
        const animBtn = document.getElementById('animBtn');
        const speedSlider = document.getElementById('speedSlider');
        
        let isAnimating = false;
        let animationInterval;
        let i = 0;

        // 11 Colors for the Animation Loop (All 10 from the panel + Super White)
        const colorHistory = [
            'radial-gradient(circle at center, #ffffff 0%, #fcfcfc 100%)', 
            '#000000', '#9b59b6', '#2ecc71', '#e74c3c', '#ffffff', '#fef9f0', '#e6f2f5', '#f4f5f7',
            'radial-gradient(circle at center, #ffffff 0%, #fce4d6 60%, #f5d0c5 100%)',
            'linear-gradient(90deg, #fde8e0 0%, #fcf3f0 50%, #fde8e0 100%)',
            '#f8c8dc'
        ];

        // --- 1. Set Color Function ---
        function setColor(color) {
            stopAnimation();
            if (color.startsWith('linear') || color.startsWith('radial')) {
                screenEl.style.backgroundImage = color;
                screenEl.style.background = ''; 
            } else {
                screenEl.style.background = color;
                screenEl.style.backgroundImage = 'none';
            }
            // Close panel automatically after selection
            studioPanel.classList.remove('open');
            resetAutoHide(); 
            requestFullScreen();
        }

        // --- 2. Toggle Studio Panel ---
        function toggleStudioPanel() {
            studioPanel.classList.toggle('open');
            resetAutoHide();
        }

        // Close panel if clicked outside
        document.addEventListener('click', function(e) {
            if (!document.getElementById('controls').contains(e.target)) {
                studioPanel.classList.remove('open');
            }
        });

        // --- 3. Animation Controls ---
        function toggleAnimation() {
            if (isAnimating) stopAnimation();
            else startAnimation();
        }

        function startAnimation() {
            isAnimating = true;
            animBtn.textContent = '⏹';
            animBtn.classList.add('active');
            resetAutoHide();

            let speed = parseInt(speedSlider.value);
            let intervalTime = 5000 / speed;

            animationInterval = setInterval(() => {
                let nextColor = colorHistory[i % colorHistory.length];
                if (nextColor.startsWith('linear') || nextColor.startsWith('radial')) {
                    screenEl.style.backgroundImage = nextColor;
                    screenEl.style.background = '';
                } else {
                    screenEl.style.background = nextColor;
                    screenEl.style.backgroundImage = 'none';
                }
                i++;
            }, intervalTime);
        }

        function stopAnimation() {
            isAnimating = false;
            clearInterval(animationInterval);
            animBtn.textContent = '▶';
            animBtn.classList.remove('active');
        }

        // --- 4. Auto-Hide ---
        let hideTimeout;
        function resetAutoHide() {
            controlsEl.classList.remove('hidden');
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                controlsEl.classList.add('hidden');
            }, 3500);
        }
        document.addEventListener('mousemove', resetAutoHide);
        document.addEventListener('touchstart', resetAutoHide);

        // --- 5. Full Screen ---
        function requestFullScreen() {
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.msRequestFullscreen) el.msRequestFullscreen();
        }

        window.onload = () => { 
            setColor('radial-gradient(circle at center, #ffffff 0%, #fcfcfc 100%)'); 
        };
    </script>
</body>
</html>
